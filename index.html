<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaEditor - MoonBit UI Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-info {
            color: #666;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="app-info">Status: Initializing Bridge...</div>
    <script src="src/bridge.js"></script>
    <script type="module">
        const info = document.getElementById('app-info')
        const renderStatus = () => {
            const reason = mbt_bridge.reject_reason
            switch (mbt_bridge.state) {
                case 'connecting':
                    info.innerText = 'Status: Connecting'
                    break
                case 'connected':
                    info.innerText = 'Status: Connected'
                    break
                case 'disconnected':
                    info.innerText = 'Status: Disconnected'
                    break
                case 'reconnecting':
                    info.innerText = 'Status: Reconnecting'
                    break
                case 'rejected':
                    info.innerText = `Status: Rejected${reason ? ` (${reason})` : ''}`
                    break
                default:
                    info.innerText = 'Status: Initializing Bridge...'
                    break
            }
        }
        mbt_bridge.onstatus = (status) => {
            let _ = status
            renderStatus()
        }
        renderStatus()
        mbt_bridge.connect_to_core()
    </script>
</body>

</html>
