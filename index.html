<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaEditor - MoonBit UI Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-info {
            color: #666;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="app-info">Status: Initializing Bridge...</div>

    <!-- 1. Load Bridge as normal script (executed IMMEDIATELY) -->
    <script src="src/js/bridge.js"></script>

    <!-- 2. Pure JS Projector Connection -->
    <script type="module">
        const info = document.getElementById('app-info')
        const originalLog = console.log
        console.log = (...a) => {
            if (a[0] === 'Core Connected.') { info.innerText = 'Status: Running (Core Linked)' }
            if (a[0] === 'Core Disconnected.') { info.innerText = 'Status: Disconnected' }
            originalLog(...a)
        }
        // Connect to the CLI core served from the same host
        mbt_bridge.connect_to_core()
    </script>
</body>

</html>
